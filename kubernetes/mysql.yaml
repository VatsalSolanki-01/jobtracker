apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      name: mysql
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: rootvatsal
            - name: MYSQL_DATABASE
              value: jobtracker
            - name: MYSQL_USER
              value: jobtracker
            - name: MYSQL_PASSWORD
              value: jobtracker123
          ports:
            - containerPort: 3306
              name: mysql


